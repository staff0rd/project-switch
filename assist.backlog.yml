- id: 8
  type: bug
  name: List selection ignores arrow-key position and always opens first item
  description: |-
    **Repro:**
    1. Run `project-switch list`
    2. Arrow down to any item other than the first
    3. Press Enter

    **Expected:** The highlighted/selected item opens.

    **Actual:** The first item in the list opens regardless of selection.
  acceptanceCriteria:
    - Pressing Enter after arrowing down opens the item currently highlighted, not the first item
  currentPhase: 1
  status: done
  comments:
    - text: "Root cause: execute_and_hide() always passed state.input (text field) to execute_action, ignoring the selected index. Fixed by extracting the highlighted item's key from filtered_entries[selected] and passing that instead."
      timestamp: 2026-04-01T09:43:50.753Z
      type: comment
    - text: Fixed execute_and_hide to use the selected item's key instead of the raw text input. When Enter is pressed, the highlighted entry's key is now extracted from filtered_entries[selected] and passed to execute_action.
      phase: 0
      timestamp: 2026-04-01T09:43:56.655Z
      type: summary
    - text: "Fixed list selection: Enter now opens the highlighted item instead of always opening the first item. Changed execute_and_hide to accept an explicit action_input parameter resolved from entries[selected]."
      phase: 1
      timestamp: 2026-04-01T09:44:41.432Z
      type: summary
