- id: 1
  type: story
  name: Close window on focus loss
  description: When the project-switch GUI window loses focus (user clicks away or switches to another app), automatically hide the window. This matches the expected behavior of launcher-style UIs like Spotlight/Alfred.
  acceptanceCriteria:
    - Window hides when user clicks on another application (both Windows and macOS)
    - Window hides when user Alt-Tabs / Cmd-Tabs away
    - Existing close behaviors still work (Escape key, selecting an item)
    - Daemon mode and standalone --gui mode both support focus-loss hiding
  plan:
    - name: Focus-loss detection
      tasks:
        - task: Add viewport().focused check in DaemonApp::update to call state.hide() when window loses focus
          verify: Build succeeds
        - task: Add viewport().focused check in LauncherApp::update to call state.hide() when window loses focus
          verify: Build succeeds
    - name: Verify
      tasks:
        - task: Test on macOS that clicking away, Cmd-Tabbing, and existing Escape/Enter behaviors all work correctly
          verify: Run /verify and /build
  currentPhase: 3
  status: done
- id: 2
  type: bug
  name: UI window does not open URLs in browser when input has no match
  description: |-
    **Repro:**
    1. Open the project-switch UI window (e.g. via hotkey)
    2. Type a URL such as `staffordwilliams.com`
    3. Press Enter when no items match

    **Expected:** The URL is detected, prefixed with `https://` if needed, and opened in the default browser.

    **Actual:** Nothing happens. The URL detection logic in `execute_action()` is not reached from the UI window code path.
  acceptanceCriteria:
    - When the user presses Enter with input that matches no items and is_url() returns true, the URL is opened in the default browser
    - Bare domains (e.g. staffordwilliams.com) are prefixed with https://
    - URLs already prefixed with http:// or https:// are opened as-is
  currentPhase: 1
  status: done
- id: 3
  type: bug
  name: Hotkey window appears but doesn't receive focus ~50% of the time
  description: |-
    **Repro:**
    1. Have another application focused (e.g. a browser or editor)
    2. Press ALT+SPACE to trigger the hotkey
    3. The project-switch list window appears

    **Expected:** The project-switch window appears on top AND receives input focus, with the text field ready for typing.

    **Actual:** ~50% of the time, the window appears on top of other windows but does not receive focus. The previously focused application retains focus. Because the window never got focus, clicking elsewhere doesn't dismiss it — you must first click the project-switch window to focus it, then click away to dismiss it.
  acceptanceCriteria:
    - The project-switch window reliably receives focus when launched via the hotkey
    - The text field is focused and ready for input immediately after the window appears
    - The window dismisses normally on focus loss regardless of how it was activated
  currentPhase: 1
  status: done
- id: 4
  type: story
  name: Graceful incomplete calculator expressions
  description: Distinguish between incomplete and genuinely invalid calculator expressions. While typing an incomplete expression (e.g. =5+), show = 5+... instead of a raw parse error. Only show invalid expression for input that is truly wrong (e.g. =abc).
  acceptanceCriteria:
    - Typing =5+ shows = 5+... (echoed partial expression) instead of a parse error
    - Typing =5*(3+ shows = 5*(3+... (incomplete due to unclosed paren or trailing op)
    - Typing =abc shows invalid expression
    - Typing =5+3 still shows = 8 as before
    - Both the egui UI and CLI autocomplete suggestions reflect the same behavior
  plan:
    - name: Detect incomplete expressions
      tasks:
        - task: Add an is_incomplete_expr helper that returns true when input ends with an operator or has unclosed parens
          verify: cargo test
        - task: "Update eval_calculator (or add a wrapper) to return a three-state result: Ok(value), Incomplete(partial), or Invalid"
          verify: cargo test
        - task: Add unit tests for incomplete vs invalid detection
          verify: cargo test
    - name: Render in both UIs
      tasks:
        - task: Update window.rs to render incomplete state as = {expr}... in an appropriate style
          verify: cargo test
        - task: Update list.rs autocomplete to show the same partial echo for incomplete expressions
          verify: cargo test
        - task: Update the CLI submit path to show a friendlier message for incomplete expressions
          verify: cargo test
  currentPhase: 2
  status: done
  comments:
    - text: Added is_incomplete_expr helper, CalcResult three-state enum (Ok/Incomplete/Invalid), and eval_calc_input wrapper. Updated all call sites (state.rs, window.rs, list.rs) to use the new classification. Incomplete expressions (trailing operator or unclosed parens) now return CalcResult::Incomplete; genuinely invalid input returns CalcResult::Invalid. Added 11 unit tests covering both detection and classification.
      phase: 0
      timestamp: 2026-03-30T07:01:36.894Z
      type: summary
    - text: Rendered CalcResult::Incomplete as '= {expr}...' in egui (gray, 28pt) and CLI autocomplete (dimmed). Updated CLI submit path to show '= {expr}...' for incomplete and 'invalid expression' for genuinely invalid input. All three UIs now share consistent behavior via eval_calc_input.
      phase: 1
      timestamp: 2026-03-31T00:14:36.234Z
      type: summary
    - text: Added normalize_decimals to handle bare decimal points (.01 -> 0.01), three-state CalcResult enum (Ok/Incomplete/Invalid), and is_incomplete_expr helper. Incomplete expressions show echoed input with ellipsis; genuinely invalid input shows 'invalid expression'. Both egui and CLI paths share eval_calc_input for consistent behavior.
      phase: 2
      timestamp: 2026-03-31T00:41:09.072Z
      type: summary
- id: 5
  type: story
  name: Recent actions on list open
  description: When the list UI opens, display the most recent actions (up to 10) instead of the full list. As soon as the user types, switch to filtering the full item list. Recent actions are persisted across sessions.
  acceptanceCriteria:
    - Executing any item from the list records it in a history file (max 10, most recent first, deduplicated)
    - When the list opens with empty input, only recent items are shown
    - Re-executing an item moves it to the top of the recents list
    - When the user types any character, filtering switches to the full item list (existing behavior)
    - If a recent item no longer exists in the config/shortcuts, it is excluded from the recents display
    - Works in both GUI and terminal modes
  plan:
    - name: History persistence
      tasks:
        - task: Add a history module that reads/writes a recent-actions file (e.g. ~/.project-switch-history.yml)
          verify: cargo build compiles without errors
        - task: Record the item key on each execution in execute_action(), cap at 10 entries, deduplicate by moving re-executed items to the top
          verify: cargo build compiles and unit test confirms dedup and cap behavior
    - name: UI integration
      tasks:
        - task: Pass recent history into WindowState. When input is empty, filtered_items() returns only recent items (validated against current items). When input is non-empty, use existing full-list filtering.
          verify: cargo build compiles without errors
        - task: Apply same recent-items logic to the terminal/inquire mode in execute()
          verify: cargo build compiles without errors
  currentPhase: 3
  status: done
  comments:
    - text: Added history module (src/history.rs) that reads/writes ~/.project-switch-history.yml with load() and record() functions. record() deduplicates by moving re-executed items to top and caps at 10 entries. Integrated into execute_action() so both GUI and terminal modes record history. Includes 5 unit tests covering add, dedup, cap, re-execute, and missing-file scenarios.
      phase: 0
      timestamp: 2026-03-31T02:57:31.520Z
      type: summary
    - text: Integrated recent history into UI. WindowState accepts recent_keys and filtered_items() returns validated recents when input is empty, full-list filtering when typing. Same logic applied to terminal/inquire ListAutocomplete. Daemon mode also loads history. Added 5 tests for recents behavior (show recents, filter full list on typing, exclude missing items, fallback when no/invalid recents).
      phase: 2
      timestamp: 2026-03-31T03:01:40.455Z
      type: summary
    - text: "Review: daemon mode was not refreshing recent_keys on window reopen — recents would be stale after first action. Fixed by adding set_recent_keys() to WindowState and calling it alongside set_items() in both hotkey and tray-menu handlers."
      timestamp: 2026-03-31T07:14:07.753Z
      type: comment
    - text: "Recent actions on list open: history module records executed items (max 10, deduplicated, most recent first). GUI and terminal modes show recents on empty input, switch to full-list filtering on typing. Missing items excluded. Fixed daemon mode to refresh recents on each window open."
      phase: 3
      timestamp: 2026-03-31T07:42:05.043Z
      type: summary
- id: 6
  type: bug
  name: Half-second delay between hotkey and GUI list appearing
  description: |-
    **Repro:**
    1. Have the hotkey service running
    2. Press ALT+SPACE

    **Expected:** The list GUI appears instantly.

    **Actual:** There is a noticeable ~500ms delay before the window appears.
  acceptanceCriteria:
    - The GUI list appears with no perceptible delay after pressing ALT+SPACE
  currentPhase: 1
  status: done
  comments:
    - text: "Phase 1 changes: (1) hotkey service: changed taskkill from blocking .status() to non-blocking .spawn() — saves ~50-100ms. (2) GUI: split load_items into load_command_items (fast, config-only) and collect_shortcut_items (slow, filesystem scan). execute_gui now loads commands immediately, opens the window, and collects shortcuts on a background thread via mpsc channel. LauncherApp polls the channel each frame and appends shortcuts when ready. (3) Added WindowState::append_items to merge shortcuts without resetting selection/input."
      timestamp: 2026-03-31T02:17:11.522Z
      type: comment
    - text: Made taskkill non-blocking in hotkey service (~50-100ms saved). Deferred shortcut filesystem scanning to a background thread in GUI mode — window opens immediately with commands, shortcuts merge in asynchronously via mpsc channel.
      phase: 0
      timestamp: 2026-03-31T02:17:17.237Z
      type: summary
    - text: "Review: launch-first-kill-later pattern fixed the race where non-blocking taskkill killed the new process. Window now opens immediately — new process spawns first, gets foreground permission, then old instances are killed by PID exclusion via wmic."
      timestamp: 2026-03-31T02:40:47.695Z
      type: comment
    - text: Eliminated hotkey-to-GUI delay by deferring shortcut filesystem scanning to a background thread (window opens immediately with commands only, shortcuts merge in async) and reordering launch_project_switch to spawn the new process before killing old instances (PID-excluded wmic, non-blocking).
      phase: 1
      timestamp: 2026-03-31T02:40:53.809Z
      type: summary
