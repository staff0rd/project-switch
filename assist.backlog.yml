      type: comment
    - text: Fixed GUI launcher dropping user args for URL commands. Changed execute_and_hide call in window.rs to pass full state.input instead of just item.key. Added regression tests in state.rs and launcher/mod.rs confirming args are preserved through the GUI code path.
      phase: 0
      timestamp: 2026-04-02T00:25:15.684Z
      type: summary
    - text: GUI launcher now passes full user input (key + args) to execute_action instead of just the selected item key. filter_items uses exact key match when input contains a space. Regression tests cover args preservation through filtering, state, resolution, and URL encoding.
