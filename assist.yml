commit:
  conventional: false
  pull: false
  push: true
notify:
  enabled: true
complexity:
  ignore:
    - "**/*test.ts*"
run:
  - name: build
    command: powershell
    args:
      - -File
      - ./build.ps1
  - name: verify:machete
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
  - name: verify:fmt
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
      - cargo
      - fmt
      - --check
  - name: fmt
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
      - cargo
      - fmt
  - name: verify:clippy
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
      - cargo
      - clippy
      - --
      - -D
      - warnings
  - name: verify:audit
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
      - cargo
      - audit
  - name: verify:duplicate-code
    command: npx
    args:
      - jscpd
      - --exit-code
      - "1"
      - -r
      - consoleFull
      - --pattern
      - "**/*.rs"
      - .
  - name: test
    command: docker
    args:
      - compose
      - run
      - --rm
      - lint
      - cargo
      - test
deny:
  - pattern: cargo
    message: Cargo is not available in this environment. Builds and checks run in the container — use /test or /build, or `BUILD_TARGET=macos docker compose run --rm build` for the macOS target. See assist.yml
  - pattern: rustc
    message: rustc is not available in this environment. Builds and checks run in the container — use /test or /build, or `BUILD_TARGET=macos docker compose run --rm build` for the macOS target. See assist.yml
  - pattern: jscpd
    message: Don't run jscpd directly — its flags/pattern live in assist.yml. Use `assist verify` (or `assist run verify:duplicate-code`) so the configured invocation is used.
